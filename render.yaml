# Render Blueprint — https://render.com
# Connect this repo, pick branch fed-merge-finished (or main once merged).

services:
  - type: web
    name: aestra
    runtime: python
    plan: free
    # Skip torch on free tier (large). Soft read still works; pFL falls back to sklearn.
    # For full pFL: add `&& pip install -r requirements-pfl.txt` to buildCommand.
    buildCommand: pip install -r requirements.txt -e . && pip install openai
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: CYCLEBENCH_USE_PFL
        value: "1"
      # Optional — set in Render dashboard, do not commit secrets:
      # OPENAI_API_KEY
      # HF_TOKEN
      # HF_DATASET_REPO
